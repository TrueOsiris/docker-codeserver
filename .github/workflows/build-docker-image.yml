# File: .github/workflows/build-docker-image.yml
# Author: Tim Chaubet

name: Master Build and Push

on:
  schedule:
    - cron: '0 0 * * *' # Daily build
  push:
    branches:
      - main # Build on any change to master
  workflow_dispatch: # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Master Repo
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Update README Image Reference
        run: |
          PRIMARY_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          # Specifically targeting the TrueOsiris registry path
          sed -i "s|image: ghcr.io/trueosiris/codeserver:latest|image: ${PRIMARY_TAG}|g" README.md
          git config --global user.name "Tim Chaubet"
          git config --global user.email "action@github.com"
          git add README.md
          if ! git diff --cached --exit-code; then
            git commit -m "docs: update master image reference to ${PRIMARY_TAG}"
            git push origin main
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # This ensures that even if the linuxserver base image updated, 
          # we pull the freshest layers before building.
          pull: true 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max