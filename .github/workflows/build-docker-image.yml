# File: .github/workflows/sync-and-rebuild.yml
# Author: Tim Chaubet

name: Sync, Build, and Update

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/codeserver

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4 # v4 is current, the warning will vanish as GitHub updates runners

      - name: Merge Upstream Changes
        run: |
          git config --global user.name "Tim Chaubet"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/TrueOsiris/docker-codeserver.git
          git fetch upstream main
          git merge upstream/main --strategy-option theirs -m "Merge upstream updates" || echo "No changes"
          rm -f .github/workflows/build-docker-image.yml

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Update README Image Reference
        run: |
          PRIMARY_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          sed -i "s|image: ghcr.io/.*codeserver:latest|image: ${PRIMARY_TAG}|g" README.md
          git add README.md
          if ! git diff --cached --exit-code; then
            git commit -m "docs: update README image to ${PRIMARY_TAG}"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Standard Push
        run: |
          git push origin main