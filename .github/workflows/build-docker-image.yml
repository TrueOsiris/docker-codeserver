# File: .github/workflows/build-docker-image.yml
# Author: Tim Chaubet

name: Build and Push

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_FULL: ${{ github.repository }}
  REPO_SHORT: ${{ github.repository_owner }}/codeserver

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REPO_FULL }}
            ${{ env.REGISTRY }}/${{ env.REPO_SHORT }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Update README Image Reference
        run: |
          # Grabs the first tag (REPO_FULL) to update the documentation
          PRIMARY_TAG="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          
          # Replaces the old registry link with the newly built tag
          sed -i "s|image: ghcr.io/trueosiris/codeserver:latest|image: ${PRIMARY_TAG}|g" README.md
          
          git config --global user.name "Tim Chaubet"
          git config --global user.email "action@github.com"
          git add README.md
          if ! git diff --cached --exit-code; then
            git commit -m "docs: update image reference to ${PRIMARY_TAG}"
            git push origin main
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Pull forces a check for the latest linuxserver base image
          pull: true 
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max